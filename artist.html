<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Artist | Proof of Concept</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .artist-header {
            background: #fff;
            color: #000;
            padding: 100px 10%;
            text-align: center;
        }
        .artist-header h1 {
            font-family: 'Space Grotesk';
            font-weight: 700;
            letter-spacing: -2px;
            font-size: 4rem;
            margin: 0;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 10px;
        }
        .gallery-item {
            aspect-ratio: 1/1;
            background-size: cover;
            background-position: center;
            filter: grayscale(1);
            transition: 0.5s;
        }
        .gallery-item:hover {
            filter: grayscale(0);
        }
    </style>
</head>
<body style="background: #f9f9f9; color: #000;">
    <div class="back-nav" style="padding: 20px 10%;">
        <a href="index.html" style="color: #000; text-decoration: none; font-weight: bold;">← Return to Dawlhaus</a>
    </div>

    <header class="artist-header">
        <div class="badge" style="background: #000; color: #fff; border: none;">Editorial Style</div>
        <h1>ELITE ARTIST</h1>
        <p style="color: #666; max-width: 600px; margin: 20px auto;">Portfolio and booking for master stylists and educators.</p>
        <a href="#" class="btn primary" style="background: #000; color: #fff; border: none;">Book My Chair</a>
    </header>

    <div class="gallery-grid">
        <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1562322140-8baeececf3df?auto=format&fit=crop&q=80&w=600');"></div>
        <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?auto=format&fit=crop&q=80&w=600');"></div>
        <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?auto=format&fit=crop&q=80&w=600');"></div>
    </div>
</body>
</html>

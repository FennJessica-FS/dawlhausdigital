<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALEXIS VANE | EDITORIAL</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Playfair+Display:italic,wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        color: #ffffff;
        font-family: "Space Grotesk", sans-serif;
        overflow-x: hidden;
      }

      /* NAVIGATION - TOP LOCKED */
      nav {
        position: fixed;
        top: 0;
        width: 100%;
        padding: 40px 5%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 1000;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.9) 0%,
          transparent 100%
        );
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 5px;
      }

      nav a {
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        transition: 0.3s;
      }
      nav a:hover {
        opacity: 0.5;
      }

      /* HERO - THE FIXED OVERLAP */
      .hero {
        height: 100vh;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 5%;
      }

      .hero-text {
        position: relative;
        z-index: 10;
        text-align: center;
        pointer-events: none;
        /* ADDS CONTRAST SO TEXT IS VISIBLE OVER WHITE BACKGROUNDS */
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .hero-text h1 {
        font-size: clamp(5rem, 18vw, 15rem);
        line-height: 0.8;
        text-transform: uppercase;
        letter-spacing: -0.05em;
      }

      .hero-text h1 span {
        display: block;
        color: transparent;
        /* Thicker stroke for better visibility */
        -webkit-text-stroke: 2px #ffffff;
      }

      .hero-image-container {
        position: absolute;
        width: 45%;
        height: 70%;
        right: 10%;
        top: 15%;
        z-index: 1;
        border: 1px solid #1a1a1a;
        overflow: hidden;
      }

      /* Adds a subtle dark tint to the image so white text pops */
      .hero-image-container::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to right, rgba(0, 0, 0, 0.4), transparent);
        z-index: 2;
      }

      .hero-image {
        width: 100%;
        height: 100%;
        background: url("https://images.unsplash.com/photo-1562322140-8baeececf3df?auto=format&fit=crop&q=80&w=800")
          center/cover;
        filter: grayscale(1);
      }

      /* 2. THE ACCOLADES (Back by popular demand) */
      .accolades-bar {
        background: #0d0d0d;
        padding: 40px 5%;
        display: flex;
        justify-content: space-around;
        border-top: 1px solid #1a1a1a;
        border-bottom: 1px solid #1a1a1a;
      }

      .stat-item {
        text-align: center;
      }
      .stat-item h4 {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-size: 1.8rem;
        margin-bottom: 5px;
      }
      .stat-item p {
        font-size: 9px;
        letter-spacing: 3px;
        color: #555;
        text-transform: uppercase;
      }

      /* 3. THE GALLERY */
      .gallery {
        padding: 100px 5%;
        background: #000;
      }
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }

      .gallery-item {
        aspect-ratio: 3/4;
        background: #111;
        overflow: hidden;
        position: relative;
      }

      .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: grayscale(1);
        transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1);
      }

      .gallery-item:hover img {
        filter: grayscale(0);
      }

      .caption {
        position: absolute;
        bottom: 20px;
        left: 20px;
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        opacity: 0.6;
      }

      /* FOOTER LINKS */
      .footer-nav {
        padding: 150px 5%;
        border-top: 1px solid #1a1a1a;
      }
      .nav-big-link {
        display: block;
        font-size: clamp(3rem, 8vw, 8rem);
        color: #fff;
        text-decoration: none;
        text-transform: uppercase;
        line-height: 1;
        padding: 30px 0;
        border-bottom: 1px solid #111;
        transition: 0.4s;
      }
      .nav-big-link:hover {
        color: #888;
        padding-left: 40px;
      }

      footer {
        padding: 60px 5%;
        text-align: center;
        color: #222;
        font-size: 10px;
        letter-spacing: 5px;
      }

      @media (max-width: 900px) {
        .hero {
          flex-direction: column;
          justify-content: flex-start;
          padding-top: 150px;
        }
        .hero-image-container {
          position: relative;
          width: 100%;
          height: 50vh;
          right: 0;
          top: 0;
          order: -1;
          margin-bottom: 40px;
        }
        .gallery-grid {
          grid-template-columns: 1fr;
        }
        .accolades-bar {
          flex-direction: column;
          gap: 30px;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="index.html">← DAWLHAUS</a>
      <div>NYC / LDN / PAR</div>
      <a href="#">BOOK CHAIR</a>
    </nav>

    <section class="hero">
      <div class="hero-image-container">
        <div class="hero-image"></div>
      </div>
      <div class="hero-text">
        <h1>ALEXIS<br /><span>VANE</span></h1>
      </div>
    </section>

    <section class="accolades-bar">
      <div class="stat-item">
        <h4>Vogue</h4>
        <p>Editorial Feature</p>
      </div>
      <div class="stat-item">
        <h4>Marie Claire</h4>
        <p>Global Campaign</p>
      </div>
      <div class="stat-item">
        <h4>Bazaar</h4>
        <p>September Issue</p>
      </div>
      <div class="stat-item">
        <h4>NYFW</h4>
        <p>Lead Stylist</p>
      </div>
    </section>

    <section class="gallery">
      <div class="gallery-grid">
        <div class="gallery-item">
          <img
            src="https://images.unsplash.com/photo-1492106087820-71f1a00d2b11?auto=format&fit=crop&q=80&w=800"
          />
          <div class="caption">Vogue Editorial</div>
        </div>
        <div class="gallery-item">
          <img
            src="https://images.unsplash.com/photo-1509631179647-0177331693ae?auto=format&fit=crop&q=80&w=800"
          />
          <div class="caption">Marie Claire '25</div>
        </div>
        <div class="gallery-item">
          <img
            src="https://images.unsplash.com/photo-1522337660859-02fbefca4702?auto=format&fit=crop&q=80&w=800"
          />
          <div class="caption">NYFW Backstage</div>
        </div>
      </div>
    </section>

    <section class="footer-nav">
      <a href="#" class="nav-big-link">Portfolio</a>
      <a href="#" class="nav-big-link">Education</a>
      <a href="#" class="nav-big-link">Studio</a>
    </section>

    <footer>© 2026 ALEXIS VANE CONCEPT // NYC</footer>
  </body>
</html>

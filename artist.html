<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Artist | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        /* RESET - This keeps it from using your main site styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #ffffff; 
            color: #000; 
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1.2;
        }
        nav {
            padding: 30px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #000;
        }
        .logo { font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .hero {
            padding: 100px 5%;
            text-align: left;
        }
        h1 {
            font-size: clamp(4rem, 15vw, 10rem);
            text-transform: uppercase;
            letter-spacing: -5px;
            margin-bottom: 40px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            border-top: 1px solid #000;
        }
        .item {
            padding: 60px 30px;
            border-right: 1px solid #000;
            border-bottom: 1px solid #000;
        }
        .item h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }
        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: #000;
            text-decoration: none;
            font-size: 0.7rem;
            border: 1px solid #000;
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Elite Artist</div>
        <div>Est. 2026</div>
    </nav>
    <section class="hero">
        <h1>Authority<br>Built.</h1>
        <p>Strategic digital homes for the industry's top educators.</p>
        <a href="index.html" class="back-link">EXIT DEMO</a>
    </section>
    <div class="grid">
        <div class="item"><h2>Editorial</h2><p>Vogue, Allure, Harper's.</p></div>
        <div class="item"><h2>Education</h2><p>Masterclasses & Tours.</p></div>
    </div>
</body>
</html>

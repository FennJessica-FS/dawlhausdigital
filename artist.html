<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexis Vane | Editorial Stylist</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --accent: #bcbcbc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 40px;
            display: flex;
            justify-content: space-between;
            z-index: 1000;
            mix-blend-mode: difference; /* Makes text visible over any background */
        }

        nav a {
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 3px;
            font-weight: 700;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 10%;
            position: relative;
        }

        .hero-title {
            font-size: clamp(5rem, 18vw, 15rem);
            line-height: 0.8;
            z-index: 10;
            pointer-events: none;
        }

        .hero-title span {
            display: block;
            margin-left: 10vw;
            color: transparent;
            -webkit-text-stroke: 1px var(--text);
        }

        .hero-image-float {
            position: absolute;
            right: 15%;
            top: 20%;
            width: 30vw;
            height: 40vw;
            background: url('https://images.unsplash.com/photo-1562322140-8baeececf3df?auto=format&fit=crop&q=80&w=800') center/cover;
            filter: grayscale(1);
            z-index: 5;
            opacity: 0.6;
        }

        /* --- CONTENT STRIP --- */
        .manifesto {
            padding: 150px 10%;
            border-top: 1px solid #333;
        }

        .manifesto-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 100px;
        }

        .manifesto h2 {
            font-size: 3rem;
            font-weight: 300;
            line-height: 1.1;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .editorial-link {
            font-size: 1.5rem;
            color: var(--text);
            text-decoration: none;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            transition: 0.4s;
            display: flex;
            justify-content: space-between;
        }

        .editorial-link:hover {
            padding-left: 20px;
            border-color: var(--text);
        }

        /* --- PORTFOLIO GRID --- */
        .work {
            padding: 0 5% 100px 5%;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
        }

        .work-item {
            background-size: cover;
            background-position: center;
            filter: grayscale(1);
            transition: 0.7s;
            height: 60vh;
        }

        .work-item:hover { filter: grayscale(0); transform: scale(0.98); }

        .item-small { grid-column: span 4; height: 40vh; margin-top: 100px; }
        .item-large { grid-column: span 8; }
        .item-mid { grid-column: 3 / span 6; height: 70vh; margin-top: -50px; }

        footer {
            padding: 100px 40px;
            text-align: center;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">← DAWLHAUS</a>
        <div>
            <a href="#work" style="margin-right: 30px;">Portfolio</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <section class="hero">
        <h1 class="hero-title">ALEXIS<br><span>VANE</span></h1>
        <div class="hero-image-float"></div>
    </section>

    <section class="manifesto">
        <div class="manifesto-grid">
            <h2>Architectural forms. <br>Editorial soul.</h2>
            <div class="links-container">
                <a href="#" class="editorial-link"><span>Portfolio</span> <span>→</span></a>
                <a href="#" class="editorial-link"><span>Education</span> <span>→</span></a>
                <a href="#" class="editorial-link"><span>The Chair</span> <span>→</span></a>
                <p style="margin-top: 20px; color: #666; font-size: 0.9rem; line-height: 1.6;">
                    Alexis Vane is a master educator and session stylist based in London/NYC, focusing on the intersection of geometry and movement.
                </p>
            </div>
        </div>
    </section>

    <section class="work" id="work">
        <div class="work-item item-large" style="background-image: url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?auto=format&fit=crop&q=80&w=1200');"></div>
        <div class="work-item item-small" style="background-image: url('https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?auto=format&fit=crop&q=80&w=600');"></div>
        <div class="work-item item-mid" style="background-image: url('https://images.unsplash.com/photo-1595476108010-b4d1f102b1b1?auto=format&fit=crop&q=80&w=800');"></div>
    </section>

    <footer>
        <button onclick="window.location.href='mailto:hello@alexisvane.com'" style="background: white; border: none; padding: 25px 60px; font-family: 'Space Grotesk'; font-weight: 700; text-transform: uppercase; cursor: pointer; letter-spacing: 2px;">
            Inquire for Bookings
        </button>
        <p style="margin-top: 40px; color: #444; font-size: 0.7rem; letter-spacing: 2px;">©2026 ALEXIS VANE DIGITAL</p>
    </footer>

</body>
</html>

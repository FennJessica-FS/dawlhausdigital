<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>313 Hospitality Sync | Proof of Concept</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Industry Specific Overrides */
        :root {
            --accent-cyan: #00f2ff; /* Keeping your branding but shifting the vibe */
        }
        
        .hospitality-hero {
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&q=80&w=1200');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .menu-section {
            padding: 60px 10%;
            background: #0f0f12;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 40px;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 10px;
        }

        .price {
            color: var(--accent-cyan);
            font-family: var(--font-retro);
        }

        .back-nav {
            padding: 20px 10%;
            display: flex;
            justify-content: flex-start;
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>
    
    <div class="back-nav">
        <a href="index.html" class="nav-link-simple">← Back to Dawlhaus</a>
    </div>

    <header class="hospitality-hero">
        <div class="hero-text">
            <div class="badge">Live Demo</div>
            <h1 style="font-family: 'Bungee';">313 SYNC</h1>
            <p>High-speed digital menus for the Detroit rush.</p>
        </div>
    </header>

    <section class="menu-section">
        <div class="about-text-box glass">
            <h2 style="font-family: 'Bungee'; color: var(--accent-cyan);">Saturday Night Specials</h2>
            
            <div class="menu-grid">
                <div class="menu-item">
                    <span>The "Dawl" Burger</span>
                    <span class="price">$18</span>
                </div>
                <div class="menu-item">
                    <span>Eastern Market Greens</span>
                    <span class="price">$14</span>
                </div>
                <div class="menu-item">
                    <span>Detroit Style Pizza</span>
                    <span class="price">$22</span>
                </div>
                <div class="menu-item">
                    <span>Hand-Cut Fries</span>
                    <span class="price">$8</span>
                </div>
            </div>

            <div class="cta-group" style="justify-content: center;">
                <a href="#" class="btn primary">Book a Table</a>
                <a href="#" class="btn secondary">View Full Menu</a>
            </div>
        </div>
    </section>

</body>
</html>

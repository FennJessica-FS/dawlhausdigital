<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maker's MKT</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #fdf000; /* Safety Yellow */
            color: #000; 
            font-family: 'Bungee', cursive;
            padding: 20px;
        }
        .container {
            border: 10px solid #000;
            min-height: 90vh;
            padding: 40px;
        }
        h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.9;
            margin-bottom: 40px;
            background: #000;
            color: #fdf000;
            display: inline-block;
            padding: 10px;
        }
        .box {
            background: #fff;
            border: 5px solid #000;
            padding: 30px;
            margin-top: 20px;
            box-shadow: 15px 15px 0px #000;
        }
        p { font-family: sans-serif; font-weight: 900; margin-top: 10px; }
        .back {
            display: block;
            margin-top: 50px;
            color: #000;
            text-transform: uppercase;
        }

</head>
<body>
    <div class="container">
        <h1>WE<br>MAKE<br>STUFF.</h1>
        <div class="box">
            <h2>CUSTOM BUILDS</h2>
            <p>From the shop floor to the storefront. No templates, just grit.</p>
        </div>
        <a href="index.html" class="back">← Back to Portfolio</a>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MAKERS // ATELIER 313</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* The Ticker - Keeping it simple and bold */
        .marquee {
            background: #ff0055;
            color: #fff;
            padding: 12px 0;
            font-family: 'Bungee', cursive;
            text-transform: uppercase;
            border-bottom: 2px solid #000;
            overflow: hidden;
        }

        /* THE FIX: Gritty Image Treatment */
        .archive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 10px;
            padding: 20px;
        }

        .archive-item {
            position: relative;
            background: #111;
            border: 1px solid #222;
            overflow: hidden;
            /* This makes them feel like the screenshot - heavy and dark */
            filter: grayscale(1) contrast(1.5) brightness(0.8);
            transition: 0.3s ease;
        }

        .archive-item:hover {
            filter: grayscale(0) contrast(1) brightness(1);
            border-color: #ff0055;
        }

        .archive-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }

        .label {
            position: absolute;
            bottom: 0;
            left: 0;
            background: #000;
            color: #fff;
            font-family: monospace;
            padding: 5px 10px;
            font-size: 0.7rem;
        }

        .unit-active {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 60px 0;
        }

        .dot {
            width: 15px;
            height: 15px;
            background: #ff0055;
            border-radius: 50%;
            box-shadow: 0 0 15px #ff0055;
        }

        .status-text {
            background: #fff;
            color: #000;
            font-family: monospace;
            font-weight: bold;
            padding: 4px 8px;
        }
    </style>
</head>
<body>

    <div class="marquee">
        <div style="display: flex; gap: 50px;">
            <span>COMMISSION A PIECE • CONSIGNMENT OPEN • 313 MADE • DETROIT ATELIER • RAW BUILDS • </span>
            <span>COMMISSION A PIECE • CONSIGNMENT OPEN • 313 MADE • DETROIT ATELIER • RAW BUILDS • </span>
        </div>
    </div>

    <div style="color: #ff3b3b; font-family: monospace; padding: 40px 20px 10px;">// ARCHIVE_FEED_PAST_EVENTS</div>

    <div class="archive-grid">
        <div class="archive-item">
            <img src="image_cfce6b.jpg" alt="The Russell">
            <div class="label">RUSSELL_IND_2026</div>
        </div>
        <div class="archive-item">
            <img src="iron_works.jpg" alt="Work" onerror="this.src='https://images.unsplash.com/photo-1504917595217-d4dc5ebe6122?q=80&w=600'">
            <div class="label">UNIT_313_CORE</div>
        </div>
        <div class="archive-item">
            <img src="vessel.jpg" alt="Vessel" onerror="this.src='https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?q=80&w=600'">
            <div class="label">CASS_CORR_PROX</div>
        </div>
    </div>

    <div class="unit-active">
        <div class="dot"></div>
        <div class="status-text">UNIT_313_ACTIVE</div>
    </div>

    <div style="margin: 0 20px; border: 1px solid #222; padding: 40px; background: #0a0a0a; display: flex; gap: 40px; align-items: center;">
        <img src="image_cfce6b.jpg" style="width: 200px; filter: grayscale(1) contrast(1.2);">
        <div>
            <div style="font-family: monospace; opacity: 0.5; margin-bottom: 10px;">ID: 313_VES_04 | $165.00</div>
            <h2 style="font-family: 'Bungee'; font-size: 3rem; margin: 0;">INDUSTRIAL VESSEL</h2>
        </div>
    </div>

</body>
</html>

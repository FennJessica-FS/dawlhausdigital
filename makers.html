<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maker Mkt | Proof of Concept</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .maker-hero {
            background: var(--accent-pink);
            padding: 100px 10%;
            transform: skewY(-2deg);
            margin-top: 50px;
        }
        .maker-hero-content {
            transform: skewY(2deg);
        }
        .product-card {
            border: 4px solid #fff;
            padding: 20px;
            background: #000;
        }
    </style>
</head>
<body style="background: #111;">
    <div class="back-nav" style="padding: 20px 10%;">
        <a href="index.html" class="nav-link-simple">← Back to Dawlhaus</a>
    </div>

    <header class="maker-hero">
        <div class="maker-hero-content">
            <h1 style="font-family: 'Bungee'; font-size: 5rem; line-height: 0.9; margin: 0;">SHOP THE DROP</h1>
            <p style="font-family: 'Bungee';">Handmade. Detroit Made. Raw Art.</p>
        </div>
    </header>

    <section style="padding: 80px 10%;">
        <div class="card-grid">
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1561336313-0bd5e0b27ec8?auto=format&fit=crop&q=80&w=400" style="width: 100%;">
                <h3 style="font-family: 'Bungee'; margin-top: 15px;">Graffiti Print #01</h3>
                <p class="price" style="font-size: 1.5rem;">$45</p>
                <button class="btn primary" style="width: 100%;">Add to Cart</button>
            </div>
        </div>
    </section>
</body>
</html>

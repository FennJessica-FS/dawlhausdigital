<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MAKERS // DETROIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        /* 1. RESET & TEXTURE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #e0e0e0; /* Concrete Grey */
            color: #1a1a1a;
            font-family: 'JetBrains Mono', monospace;
            padding: 20px;
            /* Subtle concrete texture overlay */
            background-image: url('https://www.transparenttextures.com/patterns/asfalt-light.png');
        }

        /* 2. THE INDUSTRIAL FRAME */
        .container {
            border: 8px solid #1a1a1a; /* Thick Steel Beams */
            min-height: 90vh;
            padding: 40px;
            background: #fdfdfd;
            position: relative;
        }

        /* 3. DETROIT HEADER */
        header {
            margin-bottom: 60px;
            border-bottom: 4px solid #1a1a1a;
            padding-bottom: 20px;
        }

        h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(5rem, 18vw, 15rem);
            line-height: 0.8;
            text-transform: uppercase;
            letter-spacing: -5px;
            color: #1a1a1a;
        }

        .hazard-tag {
            background: #ff4d00; /* SAFETY ORANGE */
            color: white;
            padding: 5px 15px;
            display: inline-block;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        /* 4. THE BLUEPRINT GRID */
        .maker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .product-card {
            border: 3px solid #1a1a1a;
            padding: 0;
            transition: 0.3s;
            position: relative;
        }

        .product-card:hover {
            box-shadow: 12px 12px 0px #ff4d00; /* Bold Orange Shadow */
            transform: translate(-4px, -4px);
        }

        .img-box {
            width: 100%;
            aspect-ratio: 1/1;
            background: #ddd;
            border-bottom: 3px solid #1a1a1a;
            background-size: cover;
            background-position: center;
            filter: grayscale(1) contrast(1.2);
        }

        .card-info {
            padding: 20px;
        }

        .card-info h2 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2rem;
            text-transform: uppercase;
        }

        .price {
            font-size: 1.5rem;
            color: #ff4d00;
            font-weight: bold;
        }

        .btn-add {
            display: block;
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            color: white;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-add:hover {
            background: #ff4d00;
        }

        /* FOOTER SPECS */
        footer {
            margin-top: 80px;
            font-size: 10px;
            text-transform: uppercase;
            color: #888;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="hazard-tag">Facility: Dawlhaus_Detroit</div>
            <h1>THE<br>MAKERS</h1>
            <p style="margin-top: 10px; font-weight: bold;">[ BATCH_NO: 313-001 ] — CURATED ARTIFACTS AND RAW CREATIONS</p>
        </header>

        <div class="maker-grid">
            <div class="product-card">
                <div class="img-box" style="background-image: url('https://images.unsplash.com/photo-1513828583688-c52646db42da?auto=format&fit=crop&q=80&w=800');"></div>
                <div class="card-info">
                    <h2>Industrial Lithograph</h2>
                    <p class="price">$85.00</p>
                    <a href="#" class="btn-add">Load to Cart</a>
                </div>
            </div>

            <div class="product-card">
                <div class="img-box" style="background-image: url('https://images.unsplash.com/photo-1533090161767-e6ffed986c88?auto=format&fit=crop&q=80&w=800');"></div>
                <div class="card-info">
                    <h2>Foundry Sculpture</h2>
                    <p class="price">$320.00</p>
                    <a href="#" class="btn-add">Load to Cart</a>
                </div>
            </div>
        </div>

        <footer>
            <span>Location: 42.3314° N, 83.0458° W</span>
            <span>Est. 2026 // Dawlhaus Digital</span>
        </footer>
    </div>

</body>
</html>
